name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker 镜像版本号 (例如: 1.0.1)'
        required: true
        default: 'latest'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 优先级：手动输入的版本 > Git Tag > latest
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mylists:${{ github.event.inputs.version || (github.ref_type == 'tag' && github.ref_name || 'latest') }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mylists:latest
